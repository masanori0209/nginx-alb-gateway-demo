worker_processes 1;

events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;
    limit_req_status 429;

    upstream api_a {
        server api-a:5678;
    }

    upstream api_b {
        server api-b:5678;
    }

    server {
        listen 80;

        add_header X-Gateway-Demo "nginx-compose" always;
        add_header X-Request-Id $request_id always;

        location = /health {
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location /api/a/ {
            limit_req zone=api_limit burst=3 nodelay;
            proxy_connect_timeout 2s;
            proxy_read_timeout 2s;
            proxy_pass http://api_a/;
            proxy_intercept_errors on;
            error_page 502 503 504 = @fallback;
        }

        location /api/b/ {
            limit_req zone=api_limit burst=3 nodelay;
            proxy_connect_timeout 2s;
            proxy_read_timeout 2s;
            proxy_pass http://api_b/;
            proxy_intercept_errors on;
            error_page 502 503 504 = @fallback;
        }

        location @fallback {
            internal;
            default_type text/plain;
            return 503 "upstream unavailable (fallback)\n";
        }
    }
}
